
# cargo-vet audits file

[[audits.chacha20poly1305]]
who = "Adam Hassan <adamkadaban@gmail.com>"
criteria = "safe-to-deploy"
version = "0.10.1"
notes = "Focused safe-to-deploy source review. RustCrypto AEAD; textbook RFC 8439 (X)ChaCha20-Poly1305, constant-time tag verify via subtle, Poly1305 key zeroized after use; no build.rs, no I/O, no in-crate unsafe; no RustSec/OSV advisory."

[[audits.getrandom]]
who = "Adam Hassan <adamkadaban@gmail.com>"
criteria = "safe-to-deploy"
version = "0.2.17"
notes = "Focused safe-to-deploy source review. OS-entropy RNG shim; unsafe confined to libc/syscall FFI (/dev/urandom + getrandom syscall) with correct MaybeUninit handling; no build.rs; no advisory."

[[audits.getrandom]]
who = "Adam Hassan <adamkadaban@gmail.com>"
criteria = "safe-to-deploy"
version = "0.4.3"
notes = "Focused safe-to-deploy source review. OS-entropy RNG shim; build.rs only detects MSan cfg; unsafe is libc plus a bounded linux_raw asm syscall path; no advisory."

