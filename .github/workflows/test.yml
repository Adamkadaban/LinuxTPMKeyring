name: test

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (swtpm, tpm2-tss, fprintd mocks, keyring)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libtss2-dev \
            libclang-dev \
            swtpm swtpm-tools \
            libfprint-2-dev \
            python3-dbusmock dbus-x11 \
            gnome-keyring libsecret-1-dev

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy
          cache: true

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Typecheck
        run: cargo check --workspace --all-targets

      - name: Test
        run: cargo test --workspace

      - name: cargo-audit + cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-deny

      - name: Supply-chain advisories
        run: cargo audit

      - name: Supply-chain bans/licenses/sources
        run: cargo deny check
