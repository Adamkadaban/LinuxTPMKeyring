name: test

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          # Kept ahead of need so later phases don't have to edit this file:
          #   build-essential/pkg-config/libclang-dev/libtss2-dev — C + bindgen
          #     toolchain and tpm2-tss libs the tss-esapi FFI links against (Phase 1).
          #   swtpm/swtpm-tools — software-TPM substrate CI tests run against (no hardware).
          #   dbus-x11/gnome-keyring — session bus + keyring daemon for Secret
          #     Service tests (Phase 2).
          #   python3-dbusmock — mocks fprintd over D-Bus for headless verify tests (Phase 2).
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libclang-dev \
            libtss2-dev \
            swtpm swtpm-tools \
            dbus-x11 gnome-keyring \
            python3-dbusmock

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy
          cache: true

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Typecheck
        run: cargo check --workspace --all-targets

      - name: Test
        run: cargo test --workspace

      - name: cargo-audit + cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-deny

      - name: Supply-chain advisories
        run: cargo audit

      - name: Supply-chain bans/licenses/sources
        run: cargo deny check
