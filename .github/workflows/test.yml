name: test

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          # Kept ahead of need so later phases don't have to edit this file:
          #   build-essential/pkg-config/libclang-dev/libtss2-dev — C + bindgen
          #     toolchain and tpm2-tss libs the tss-esapi FFI links against (Phase 1).
          #   swtpm/swtpm-tools — software-TPM substrate CI tests run against (no hardware).
          #   tpm2-tools — `tpm2_dictionarylockout` for the privileged DA-lockout reset the
          #     hard-lockout recovery tests exercise (Phase 1 #16); runtime dep for `tess recover`.
          #   dbus-x11/gnome-keyring — session bus + keyring daemon for Secret
          #     Service tests (Phase 2).
          #   python3-dbusmock — mocks fprintd over D-Bus for headless verify tests (Phase 2).
          #   libpam0g-dev — libpam.so the tess-pam module links against (Phase 2).
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libclang-dev \
            libtss2-dev \
            swtpm swtpm-tools \
            tpm2-tools \
            dbus-x11 gnome-keyring \
            python3-dbusmock \
            libpam0g-dev

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
        with:
          components: rustfmt, clippy
          cache: true

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Typecheck
        run: cargo check --workspace --all-targets

      - name: Test
        run: cargo test --workspace

      - name: Test (swtpm substrate)
        run: cargo test -p tess-tpm --features sim

      - name: Test (Secret Service daemon)
        run: cargo test -p tess-keyring --features daemon-tests

      - name: Test (enroll transaction — swtpm + keyring)
        run: cargo test -p tess-cli --features sim,daemon-tests

      - name: PAM module load smoke test (pamtester)
        env:
          # Keep resolution deterministic regardless of the runner environment (the debug build
          # would otherwise honour this); the helper= module argument below is authoritative anyway.
          TESS_PAM_HELPER: ""
        run: |
          set -euxo pipefail
          unset TESS_PAM_HELPER
          sudo apt-get install -y --no-install-recommends pamtester
          cargo build -p tess-pam
          so=target/debug/libpam_tess.so
          test -f "$so"
          # Locate the PAM module directory via a stock module that is always installed.
          pam_dir=$(dirname "$(find /lib /usr/lib -name pam_permit.so -print -quit 2>/dev/null)")
          test -n "$pam_dir"
          sudo install -m 0644 "$so" "$pam_dir/pam_tess.so"
          # A no-op stack: our module (optional) backed by pam_permit so the transaction succeeds.
          # The explicit absolute helper= argument pins helper resolution to a known-absent path, so
          # the smoke test is deterministic no matter what the environment holds.
          sudo tee /etc/pam.d/tess-smoke >/dev/null <<'EOF'
          auth     optional  pam_tess.so helper=/nonexistent/tess-pam-smoke-helper
          auth     required  pam_permit.so
          session  optional  pam_tess.so helper=/nonexistent/tess-pam-smoke-helper
          session  required  pam_permit.so
          EOF
          user=$(id -un)
          # The compiled .so must dlopen through libpam and a no-op session must return success.
          pamtester tess-smoke "$user" open_session
          pamtester tess-smoke "$user" close_session
          # authenticate must be callable and fail open (pam_permit yields overall success).
          pamtester tess-smoke "$user" authenticate


      - name: Install cargo-deb
        uses: taiki-e/install-action@9e1e5806d4a4822de933115878265be9aaa786d9 # v2
        with:
          tool: cargo-deb

      - name: Package .deb and verify contents
        run: |
          set -euxo pipefail
          # cargo-deb packages the binaries already in target/release; build just the two crates the
          # .deb assets come from — tess-cli (tess + tess-pam-helper) and tess-pam (libpam_tess.so) —
          # then package without rebuilding. Contents-only check — the package is never installed.
          cargo build --release -p tess-cli -p tess-pam
          deb=$(cargo deb -p tess-cli --no-build)
          test -f "$deb"
          dpkg -c "$deb" | tee /tmp/tess-deb-contents.txt
          grep -Eq ' \./usr/bin/tess$' /tmp/tess-deb-contents.txt
          grep -Eq ' \./usr/lib/tess/tess-pam-helper$' /tmp/tess-deb-contents.txt
          grep -Eq ' \./usr/lib/x86_64-linux-gnu/security/pam_tess\.so$' /tmp/tess-deb-contents.txt
          grep -Eq ' \./usr/lib/udev/rules\.d/70-tess-tpm\.rules$' /tmp/tess-deb-contents.txt

      - name: TPM-access install wiring (static assertions)
        run: |
          set -euo pipefail
          # Ensure shellcheck is present so the test's shellcheck assertions actually run (they
          # self-skip if it's missing). GitHub-hosted runners ship it; install defensively otherwise.
          if ! command -v shellcheck >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq shellcheck
          fi
          deploy/tests/install-tpm-access.test.sh

      - name: cargo-audit + cargo-deny
        uses: taiki-e/install-action@9e1e5806d4a4822de933115878265be9aaa786d9 # v2
        with:
          tool: cargo-audit,cargo-deny

      - name: Supply-chain advisories
        run: cargo audit

      - name: Supply-chain bans/licenses/sources
        run: cargo deny check

  vet:
    name: cargo vet
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
        with:
          cache: true

      - name: Install cargo-vet
        uses: taiki-e/install-action@9e1e5806d4a4822de933115878265be9aaa786d9 # v2
        with:
          # Pinned: cargo-vet version bumps can reformat/migrate the supply-chain store and make
          # --locked fail on unrelated PRs. Bump deliberately in a dedicated store-update PR.
          tool: cargo-vet@0.10.2

      # The vet store is self-contained (exemptions only, no external [imports]), so there is no
      # upstream audit set to fetch and the gate is reproducible. --locked forbids cargo vet from
      # mutating the store, turning any drift between the committed exemptions and the lockfile into a
      # CI failure. cargo vet never compiles the workspace, so no system libraries are needed.
      - name: cargo vet
        run: cargo vet --locked
