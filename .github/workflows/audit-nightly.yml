name: audit-nightly

# Re-audits the unchanged lockfile daily so an advisory disclosed after a PR
# merged fails the next morning instead of silently lingering until the next push.
on:
  schedule:
    - cron: "17 7 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
        with:
          cache: true

      - name: Install cargo-audit + cargo-deny
        uses: taiki-e/install-action@9e1e5806d4a4822de933115878265be9aaa786d9 # v2
        with:
          tool: cargo-audit,cargo-deny

      - name: Advisory scan (RustSec)
        run: cargo audit

      - name: cargo-deny advisories
        run: cargo deny check advisories
